; platformio.ini
; ESP32-S3-WROOM-1 N16R8 — ESP-IDF 5.x puro
; 16MB flash QIO + 8MB PSRAM Octal SPI

[env:esp32-s3-devkitc-1]
; Pin da plataforma: 6.10.0 traz ESP-IDF v5.3.x estável.
platform           = espressif32 @ 6.10.0
board              = esp32-s3-devkitc-1
framework          = espidf

; --- Hardware override (não confiar só no board JSON) ---
board_build.mcu          = esp32s3
board_build.f_cpu        = 240000000L
board_build.f_flash      = 80000000L
board_build.flash_mode   = qio
board_build.flash_size   = 16MB
board_upload.flash_size  = 16MB
board_upload.maximum_size = 16777216
board_build.partitions   = partitions.csv

; --- Build ---
; PSRAM Octal vive em sdkconfig.defaults (Kconfig é fonte de verdade no espidf).
build_flags =
    -DCORE_DEBUG_LEVEL=3

; --- Monitor ---
monitor_speed = 115200
monitor_filters =
    esp32_exception_decoder
    colorize
    time

; --- Upload ---
upload_speed = 460800
upload_port  = /dev/cu.usbmodem11201
monitor_port = /dev/cu.usbmodem11201
; Devkit chinês com auto-reset não confiável.
; Antes de cada upload: segurar BOOT, tocar RESET, soltar BOOT.
upload_resetmethod = no_reset
; Para `pio run -t upload` o stub falha nesse silício (rev v0.2).
; Workaround: usar scripts/flash.sh em vez do `-t upload`.
