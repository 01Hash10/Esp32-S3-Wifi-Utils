; platformio.ini
; ESP32-S3-WROOM-1 N16R8 — ESP-IDF 5.x puro
; 16MB flash QIO + 8MB PSRAM Octal SPI

[env:esp32-s3-devkitc-1]
; Pin da plataforma: 6.5.0 = ESP-IDF v5.1.2.
; Downgrade obrigatório a partir de IDF 5.2 a Espressif adicionou um filter
; mais cedo no caminho TX (`unsupport frame type: 0c0`) que bloqueia
; deauth ANTES do `ieee80211_raw_frame_sanity_check` — nosso bypass via
; `--weaken-symbol` em wsl_bypasser não alcança mais.
; Em 5.1.2 o método clássico (override C + weak link) ainda funciona.
; Refs: github.com/risinek/esp32-wifi-penetration-tool issues #140 e PR #61.
platform           = espressif32 @ 6.5.0
board              = esp32-s3-devkitc-1
framework          = espidf

; --- Hardware override (não confiar só no board JSON) ---
board_build.mcu          = esp32s3
board_build.f_cpu        = 240000000L
board_build.f_flash      = 80000000L
board_build.flash_mode   = qio
board_build.flash_size   = 16MB
board_upload.flash_size  = 16MB
board_upload.maximum_size = 16777216
board_build.partitions   = partitions.csv

; --- Build ---
; PSRAM Octal vive em sdkconfig.defaults (Kconfig é fonte de verdade no espidf).
build_flags =
    -DCORE_DEBUG_LEVEL=3
    ; Patch binário aplicado em
    ; ~/.platformio/packages/framework-espidf@3.50102.240122/components/esp_wifi/lib/esp32s3/libnet80211.a
    ; Função `ieee80211_raw_frame_sanity_check` modificada pra `return 0;`
    ; após `entry a1, 64` (4 bytes em offset 0x2a0f de ieee80211_output.o:
    ; movi.n a2, 0; retw.n). Backup do original em libnet80211.a.bak.
    ; Bypassa o filter `unsupport frame type: 0c0` em `esp_wifi_80211_tx`,
    ; permitindo injection de mgmt frames (deauth 0xC0, beacon, etc).
    ;
    ; IDF 5.1.x sobe Werror pra warnings que afetam arquivos gerados
    ; (x509_crt_bundle.S nested comment, etc). Permite build.
    -Wno-comment
    -Wno-stringop-truncation

; --- Monitor ---
monitor_speed = 115200
monitor_filters =
    esp32_exception_decoder
    colorize
    time

; --- Upload ---
upload_speed = 460800
upload_port  = /dev/cu.usbmodem11201
monitor_port = /dev/cu.usbmodem11201
; Devkit chinês com auto-reset não confiável.
; Antes de cada upload: segurar BOOT, tocar RESET, soltar BOOT.
upload_resetmethod = no_reset
; Para `pio run -t upload` o stub falha nesse silício (rev v0.2).
; Workaround: usar scripts/flash.sh em vez do `-t upload`.
